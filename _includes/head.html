<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- jekyll_feed_meta -%}
  {%- if site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}

  <!-- Carga los estilos originales de Minima para que no se rompa el diseño -->
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">

  <!-- Importar la fuente manuscrita 'Pacifico' desde Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

  <!-- Tus estilos personalizados: Modo Oscuro + Letra Linda -->
  <style>
    body {
      background-color: #121212 !important;
      color: #e0e0e0 !important;
    }
    .site-title, .site-nav .page-link, .post-meta, .post-link, .site-header .site-title, .post-title, .footer-heading {
      color: #e0e0e0 !important;
    }
    a {
      color: #4da6ff !important;
    }
    .site-header {
      border-top: 5px solid #4da6ff !important;
      background-color: #1a1a1a !important;
      border-bottom: 1px solid #2d2d2d !important;
    }
    .site-footer {
      background-color: #1a1a1a !important;
      border-top: 1px solid #2d2d2d !important;
    }
    .post-content h1, .post-content h2, .post-content h3, .post-content h4, .post-content p, .post-content li, .post-content {
      color: #ffffff !important;
    }
    .wrapper {
      background-color: #121212 !important;
    }

    /* Aplicar la fuente manuscrita SOLO a los títulos */
    .site-title, .post-title, .post-link, .post-content h1, .post-content h2, .footer-heading {
      font-family: 'Pacifico', cursive !important;
      font-weight: normal !important;
    }
  </style>
</head>

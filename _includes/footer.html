<footer class="site-footer h-card">
  <data class="u-url" href="{{ "/" | relative_url }}"></data>

  <div class="wrapper">
    <h2 class="footer-heading">{{ site.title | escape }}</h2>
    <div class="footer-col-wrapper">
      <div class="footer-col footer-col-1">
        <ul class="contact-list">
          <li class="p-name">
            {%- if site.author -%}
              {{ site.author | escape }}
            {%- else -%}
              {{ site.title | escape }}
            {%- endif -%}
          </li>
          {%- if site.email -%}
          <li><a class="u-email" href="mailto:{{ site.email }}">{{ site.email }}</a></li>
          {%- endif -%}
        </ul>
      </div>

      <div class="footer-col footer-col-2">
        {%- include social.html -%}
      </div>

      <div class="footer-col footer-col-3">
        <p>{{ site.description | escape }}</p>
      </div>
    </div>
  </div>
</footer>

<!-- Importar Fira Code desde Google Fonts para TODO el blog -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">

<!-- Estilos Completos Paleta Dracula + Tablas Optimizadas -->
<style>
  /* ACTIVAR LIGADURAS EN TODO EL BLOG (Flechas y símbolos mágicos) */
  body, html, p, li, span, time, code, pre {
    background-color: #282a36 !important; /* Gris violáceo Dracula */
    color: #f8f8f2 !important;            /* Blanco brillante Dracula */
    font-family: 'Fira Code', monospace !important;
    font-size: 16px !important;
    font-variant-ligatures: common-ligatures !important;
    text-rendering: optimizeLegibility !important;
  }
  
  /* Títulos principales y enlaces en Fira Code Bold */
  .site-title, .post-title, .post-link, .post-content h1, .post-content h2, .post-content h3, .footer-heading {
    font-family: 'Fira Code', monospace !important;
    font-weight: 700 !important;
    color: #f8f8f2 !important;
  }

  .site-title {
    font-size: 1.8rem !important;
    letter-spacing: -0.5px;
  }

  .post-title {
    font-size: 2rem !important;
  }

  /* Enlaces generales en el color Cian de Dracula */
  a {
    color: #8be9fd !important;
    font-family: 'Fira Code', monospace !important;
  }
  
  .post-link {
    color: #f8f8f2 !important;
    text-decoration: none;
  }
  .post-link:hover {
    color: #bd93f9 !important;
  }

  /* ==========================================
     NUEVO ESTILO PARA LAS TABLAS (ESTILO DRACULA)
     ========================================== */
  table {
    background-color: #1e1f29 !important; /* Fondo gris oscuro oficial */
    color: #f8f8f2 !important;            /* Letras blancas/claras */
    border-collapse: collapse !important;
    border: 1px solid #44475a !important; /* Borde general intermedio */
    margin: 30px 0 !important;
    width: 100% !important;
  }

  /* Encabezados de la tabla (Th) */
  table th {
    background-color: #1e1f29 !important; 
    color: #f8f8f2 !important;            /* Texto claro en títulos */
    font-weight: 700 !important;
    border: 1px solid #44475a !important;
    padding: 12px !important;
  }

  /* Celdas de datos (Td) */
  table td {
    background-color: #1e1f29 !important; /* Forzar fondo oscuro en todas las filas */
    color: #f8f8f2 !important;            /* Forzar texto claro en todas las filas */
    border: 1px solid #44475a !important;
    padding: 12px !important;
  }

  /* Quitar los fondos grises/blancos alternados que pone Jekyll por defecto */
  table tr, table tr:nth-child(even), table tr:td {
    background-color: #1e1f29 !important;
  }

  /* Resaltado sutil al pasar el cursor sobre una fila (opcional) */
  table tr:hover {
    background-color: #282a36 !important;
  }
  /* ========================================== */

  /* Píldoras de código en línea */
  code {
    background-color: #1e1f29 !important;
    color: #ff79c6 !important;            /* Texto Rosa Dracula */
    border: 1px solid #bd93f9 !important; /* Borde Violeta Dracula */
    padding: 3px 6px !important;
    border-radius: 4px !important;
    font-size: 0.9em !important;
  }

  /* Líneas divisorias --- en Violeta Dracula */
  hr {
    background-color: #bd93f9 !important;
    border: none !important;
    height: 2px !important;
    margin: 2em 0 !important;
    opacity: 1 !important;
  }

  /* Cabecera y Pie de página con estilo Dracula */
  .site-header {
    background-color: #1e1f29 !important;
    border-bottom: 1px solid #44475a !important;
    border-top: 5px solid #bd93f9 !important;
  }
  
  .site-footer {
    background-color: #1e1f29 !important;
    border-top: 1px solid #44475a !important;
  }

  .site-nav .page-link, .post-meta {
    color: #6272a4 !important; /* Gris azulado para data secundaria */
    font-family: 'Fira Code', monospace !important;
  }

  /* Hacer visible el menú de hamburguesa en el celular */
  .menu-icon svg {
    fill: #bd93f9 !important;
  }
  
  .trigger {
    background-color: #1e1f29 !important;
  }

  .wrapper {
    background-color: transparent !important;
  }
</style>
